<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="683" viewBox="0 0 1024 683" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu Linux setup thumbnail</title>
  <desc id="desc">A Linux terminal setup visual for development tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0764"/>
      <stop offset="0.54" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1024" height="683" fill="url(#bg)"/>
  <circle cx="779" cy="158" r="142" fill="#ffffff" opacity="0.09"/>
  <g filter="url(#shadow)">
    <rect x="128" y="122" width="768" height="438" rx="28" fill="#111827"/>
    <rect x="128" y="122" width="768" height="66" rx="28" fill="#1f2937"/>
    <circle cx="174" cy="155" r="10" fill="#ef4444"/>
    <circle cx="207" cy="155" r="10" fill="#f59e0b"/>
    <circle cx="240" cy="155" r="10" fill="#22c55e"/>
    <text x="173" y="249" fill="#fb923c" font-family="Consolas, monospace" font-size="29">hisham@ubuntu:~$</text>
    <text x="173" y="306" fill="#f8fafc" font-family="Consolas, monospace" font-size="27">mkdir projects</text>
    <text x="173" y="363" fill="#f8fafc" font-family="Consolas, monospace" font-size="27">python app.py</text>
    <text x="173" y="420" fill="#86efac" font-family="Consolas, monospace" font-size="27">setup complete</text>
    <rect x="642" y="255" width="135" height="135" rx="30" fill="#f97316"/>
    <circle cx="710" cy="322" r="42" fill="#111827"/>
    <circle cx="710" cy="322" r="19" fill="#f97316"/>
  </g>
  <text x="72" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Ubuntu Linux Setup</text>
  <text x="72" y="124" fill="#ffedd5" font-family="Arial, sans-serif" font-size="22">Terminal practice and developer tools</text>
</svg>
